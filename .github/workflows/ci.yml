name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: |
          pip install black isort flake8

      - name: black --check
        run: black --check .

      - name: isort --check
        run: isort --check-only --profile black .

      - name: flake8
        run: flake8 .

  test:
    name: Unit tests (no LLM)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pytest pytest-asyncio pydantic
          # Install agenteval as editable so reference_system can import it
          pip install -e ./agenteval

      - name: Seed fixtures
        run: python scripts/seed_fixtures.py

      - name: Run fast tests (no LLM)
        # Slow/LLM-dependent tests need Ollama — skip in CI for now.
        # Week 7 will add a self-hosted runner with Ollama if needed.
        run: pytest tests/ -m "not slow" -v
